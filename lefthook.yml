# Local git hooks. See docs/development.md ("Guardrails").
#
# Fast, infra-free gates that close the loop BEFORE CI:
#   pre-commit  eslint --fix on staged TS/TSX
#   pre-push    tsc --noEmit + frontend unit tests
#
# Jobs scope per workspace via `root:` — a backend-only push runs the backend
# jobs and skips the frontend ones (push_files filtered to that root), and
# vice-versa. Both tiers now consume packages/shared-types via `import type`
# (#820), so a change THERE can only surface in a consumer's tsc — its own
# typecheck-shared job catches the package in isolation, and CI's `build` job
# (npm run build --workspaces) is the cross-tier authority that re-typechecks
# both consumers against it.
#
# Backend vitest stays CI-only — it needs Postgres, and keeping pre-push
# infra-free means it never blocks on a DB being up. The tsc gate is the
# high-value one: vitest transpiles via esbuild and does NOT type-check, so
# type-only errors otherwise slip past `test`/`lint` and only surface in CI's
# `build` job. Pre-push catches them locally.
#
# Hooks install via the root `prepare` script on `npm install`.
# Do NOT bypass with `--no-verify` — fix the failure instead. Since #691 the
# fallow audit also runs server-side (CI `fallow` job, a required check), so a
# bypassed hook is re-checked on the PR anyway; adjudicated exceptions belong
# in the diff as `fallow-ignore-next-line` inline suppressions, not in a flag.

pre-commit:
  parallel: true
  commands:
    # fallow audit on changed files: dead code, complexity, duplication.
    # Baseline-aware (.fallowrc.jsonc + .fallow/baseline.json). Runs the PINNED
    # devDependency binary (#691) — same version as CI's `fallow` job — and
    # fails loudly when it's missing (run `npm install`) instead of skipping.
    fallow:
      run: |
        FALLOW="node_modules/.bin/fallow"
        if [ ! -x "$FALLOW" ]; then
          echo "fallow is not installed (node_modules/.bin/fallow missing) — run: npm install" >&2
          exit 1
        fi
        UPSTREAM="$(git rev-parse --abbrev-ref --symbolic-full-name '@{upstream}' 2>/dev/null || true)"
        if [ -n "$UPSTREAM" ]; then
          BASE="$(git merge-base "$UPSTREAM" HEAD 2>/dev/null || echo "$UPSTREAM")"
        else
          BASE="origin/staging"
        fi
        # --no-cache: skip fallow's persistent base-snapshot git worktree
        # (fallow-audit-base-cache-*). Those leak — they accumulate and exhaust
        # the git worktree slot limit, which broke the autodev/antidote pipeline.
        "$FALLOW" audit --base "$BASE" --quiet --gate-marker pre-commit --no-cache
    # fallow twin of eslint's require-description gate (#1045): every
    # `fallow-ignore-next-line` must carry a `-- <reason>`. fallow has no built-in
    # reason requirement, so this trivial grep supplies one. Also a CI step.
    fallow-reasons:
      run: sh scripts/check-fallow-reasons.sh
    # Banner twin of fallow-reasons (#1057): no lint rule detects section
    # dividers, so this grep gate enforces the CLAUDE.md banner ban in
    # frontend/src. Also a CI step.
    comment-banners:
      run: sh scripts/check-comment-banners.sh
    lint-backend:
      root: "backend/"
      glob: "**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    lint-frontend:
      root: "frontend/"
      glob: "**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

# Keep the generated Prisma client in sync with the checked-out schema (#433):
# the client is a gitignored artifact, so branch switches / pulls that move
# schema.prisma or migrations otherwise leave it stale (pre-push tsc errors on
# "missing" models; runtime 500s on unknown enums). Both hooks share one
# guarded script that no-ops when the schema didn't change between refs.
post-checkout:
  commands:
    prisma-regen:
      run: sh scripts/git-hooks/prisma-regen-if-schema-changed.sh checkout {0}

post-merge:
  commands:
    prisma-regen:
      run: sh scripts/git-hooks/prisma-regen-if-schema-changed.sh merge

pre-push:
  parallel: true
  commands:
    typecheck-shared:
      root: "packages/shared-types/"
      run: npx tsc --noEmit
    typecheck-backend:
      root: "backend/"
      run: npx tsc --noEmit
      fail_text: |
        Backend tsc failed. If errors say a model/enum is missing on PrismaClient
        (e.g. "Property 'x' does not exist"), the generated client is stale for
        this branch's schema — run: cd backend && npx prisma generate
        (see docs/development.md "Prisma workflow").
    typecheck-frontend:
      root: "frontend/"
      run: npx tsc --noEmit
    test-frontend:
      root: "frontend/"
      run: npm run test
