# Local git hooks. See docs/development.md ("Guardrails").
#
# Fast, infra-free gates that close the loop BEFORE CI:
#   pre-commit  eslint --fix on staged TS/TSX
#   pre-push    tsc --noEmit + frontend unit tests
#
# Jobs scope per workspace via `root:` — a backend-only push runs the backend
# jobs and skips the frontend ones (push_files filtered to that root), and
# vice-versa. The two workspaces share no types, so this is correct and faster.
#
# Backend vitest stays CI-only — it needs Postgres, and keeping pre-push
# infra-free means it never blocks on a DB being up. The tsc gate is the
# high-value one: vitest transpiles via esbuild and does NOT type-check, so
# type-only errors otherwise slip past `test`/`lint` and only surface in CI's
# `build` job. Pre-push catches them locally.
#
# Hooks install via the root `prepare` script on `npm install`.
# Do NOT bypass with `--no-verify` — fix the failure instead.

pre-commit:
  parallel: true
  commands:
    # fallow audit on changed files: dead code, complexity, duplication.
    # Baseline-aware (.fallowrc.jsonc + .fallow/baseline.json); skips silently
    # if fallow isn't installed so the hook stays infra-free.
    fallow:
      run: |
        command -v fallow >/dev/null 2>&1 || exit 0
        UPSTREAM="$(git rev-parse --abbrev-ref --symbolic-full-name '@{upstream}' 2>/dev/null || true)"
        if [ -n "$UPSTREAM" ]; then
          BASE="$(git merge-base "$UPSTREAM" HEAD 2>/dev/null || echo "$UPSTREAM")"
        else
          BASE="origin/staging"
        fi
        # --no-cache: skip fallow's persistent base-snapshot git worktree
        # (fallow-audit-base-cache-*). Those leak — they accumulate and exhaust
        # the git worktree slot limit, which broke the autodev/antidote pipeline.
        fallow audit --base "$BASE" --quiet --gate-marker pre-commit --no-cache
    lint-backend:
      root: "backend/"
      glob: "**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    lint-frontend:
      root: "frontend/"
      glob: "**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck-backend:
      root: "backend/"
      run: npx tsc --noEmit
    typecheck-frontend:
      root: "frontend/"
      run: npx tsc --noEmit
    test-frontend:
      root: "frontend/"
      run: npm run test
