name: CI

# push:staging matters because staging's protection is non-strict (branches
# needn't be up to date to merge): two independently-green PRs can combine
# badly, and this post-merge run is what surfaces that within minutes.
on:
  pull_request:
  push:
    branches: [main, staging]

# Cancel superseded runs on the same ref so redundant pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - run: npm run lint

  fallow:
    # Server-side twin of the lefthook pre-commit fallow gate (#691): audits the
    # PR diff for NEW dead code / complexity / duplication against the PR base.
    # This is the enforcement layer — a locally bypassed hook (--no-verify) gets
    # re-checked here, so adjudicated exceptions must be inline
    # `fallow-ignore-next-line` suppressions, visible in the diff.
    #
    # PR-only (an audit needs a base to diff against; push runs on main/staging
    # are post-merge). Skips fork PRs and the staging->main promote PR — every
    # line in a promote was already audited on its feature PR. The skip must
    # stay JOB-level: a skipped job still reports a "skipped" conclusion, which
    # satisfies the required check; a workflow-level filter would block merges.
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(github.event.pull_request.head.ref == 'staging' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: `fallow audit --base` needs the base branch and the
          # merge-base commits, which the default shallow clone doesn't have.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: fallow audit (new findings vs PR base)
        run: npx fallow audit --base "origin/${{ github.event.pull_request.base.ref }}" --gate new-only --no-cache

      # Phase 2 of #691 — repo-wide zero-CRITICAL ratchet. Enable once the
      # CRITICAL complexity tier is cleared (#684-#689, epic #692 stage 1).
      # - name: fallow health (no CRITICAL findings repo-wide)
      #   run: npx fallow health --min-severity critical

  build:
    # Production type-check + bundle. vitest transpiles via esbuild and does NOT
    # type-check, so type-only errors slip past `test`/`lint` and only surface in
    # the `tsc` build Railway runs. This job is that gate. No Postgres needed —
    # it only type-checks and bundles; `prisma generate` provides the client
    # types the backend `tsc` imports.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate
        working-directory: backend
        # prisma.config.ts validates DATABASE_URL at load even for `generate`,
        # which never connects — a dummy URL satisfies it without a Postgres.
        env:
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
        run: npx prisma generate

      - run: npm run build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Keep this in sync with the image in docker-compose.yml
        image: postgres:17-alpine
        env:
          POSTGRES_USER: character_sheet
          POSTGRES_PASSWORD: character_sheet
          POSTGRES_DB: character_sheet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U character_sheet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://character_sheet:character_sheet@localhost:5432/character_sheet

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate / migrate / seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - run: npm test

  e2e:
    # Playwright smoke suite against a booted dev stack (same postgres service as
    # `test`, plus the backend + Vite dev servers the e2e harness proxies through).
    # A required check. Runs SERIALLY (playwright.config.ts sets workers: 1) — the
    # specs share one dev stack and a campaign allows only one active session, so
    # parallel workers overload the stack; don't reintroduce --workers here.
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # Keep this in sync with the image in docker-compose.yml
        image: postgres:17-alpine
        env:
          POSTGRES_USER: character_sheet
          POSTGRES_PASSWORD: character_sheet
          POSTGRES_DB: character_sheet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U character_sheet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://character_sheet:character_sheet@localhost:5432/character_sheet

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate / migrate / seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        # ALLOW_DEV_LOGIN powers the e2e harness's passwordless session mint; PORT
        # matches the Vite proxy target below. Backgrounded — survives to later steps.
        env:
          PORT: "4000"
          ALLOW_DEV_LOGIN: "true"
        run: nohup npm run dev --workspace backend > /tmp/backend.log 2>&1 &

      - name: Build frontend
        # e2e runs against the production build (served by `vite preview`), NOT the
        # dev server — pre-compiled assets render fast + deterministically, so no
        # on-demand compilation slows first renders and times out specs.
        # VITE_API_URL is inlined at build time and keeps the SPA same-origin.
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Start frontend (preview)
        # `vite preview` serves the built dist/ on :5173 with the same /api proxy
        # (vite.config.ts `preview.proxy`), so the session cookie stays first-party.
        env:
          VITE_PROXY_TARGET: http://localhost:4000
        run: nohup npm run preview --workspace frontend -- --port 5173 > /tmp/frontend.log 2>&1 &

      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/api/health >/dev/null && curl -sf http://localhost:5173 >/dev/null; then
              echo "stack ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "stack failed to start"; cat /tmp/backend.log /tmp/frontend.log; exit 1

      - name: Run Playwright
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5173
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7
