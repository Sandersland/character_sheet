name: CI

# push:staging matters because staging's protection is non-strict (branches
# needn't be up to date to merge): two independently-green PRs can combine
# badly, and this post-merge run is what surfaces that within minutes.
on:
  pull_request:
  push:
    branches: [main, staging]

# Cancel superseded runs on the same ref so redundant pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - run: npm run lint

  fallow:
    # Server-side twin of the lefthook pre-commit fallow gate (#691) — two gates
    # in one job:
    #   1. AUDIT (PR-only step): audits the PR diff for NEW dead code /
    #      complexity / duplication against the PR base. The enforcement layer —
    #      a locally bypassed hook (--no-verify) gets re-checked here, so
    #      adjudicated exceptions must be inline `fallow-ignore-next-line`
    #      suppressions, visible in the diff. Needs a base to diff against, so
    #      the step runs on PR events only and is skipped on the staging->main
    #      promote PR (every line in a promote was already audited on its
    #      feature PR).
    #   2. HEALTH (every event): the repo-wide zero-CRITICAL ratchet (#702).
    #      Runs on pushes to main/staging too, so a direct push can't slip a
    #      CRITICAL past the gate the way a PR-only job would.
    #
    # Fork PRs skip the WHOLE job at job level: a skipped job still reports a
    # "skipped" conclusion, which satisfies the required check (a workflow-level
    # filter would block merges instead).
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: `fallow audit --base` needs the base branch and the
          # merge-base commits, which the default shallow clone doesn't have.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      # The backend's `@/generated/prisma/*` client is gitignored, so without this
      # step fallow can't resolve those imports and flags every NEW file that
      # imports the client as an "unresolved import" (inherited ones are excluded
      # by the new-only gate, so this only bites files a PR adds). Generating the
      # client — as the build job does — makes fallow's import graph accurate.
      # prisma.config.ts validates DATABASE_URL even for `generate` (never
      # connects), so a dummy URL satisfies it without a Postgres.
      - name: Prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
        run: npx prisma generate

      # PR-only + skip the staging->main promote PR. Guarding on the PR event
      # here (rather than at job level) lets the health step below run on push
      # events too. --no-install forces the locally-pinned binary (never a
      # registry fallback), matching the lefthook hook's node_modules/.bin/fallow.
      - name: fallow audit (new findings vs PR base)
        if: >-
          github.event_name == 'pull_request' &&
          !(github.event.pull_request.head.ref == 'staging' && github.event.pull_request.base.ref == 'main')
        run: npx --no-install fallow audit --base "origin/${{ github.event.pull_request.base.ref }}" --gate new-only --no-cache

      # Phase 2 of #691 — repo-wide zero-CRITICAL ratchet, enabled 2026-07-11
      # after the #692 stage-1 burn-down (#684-#689) cleared the CRITICAL tier.
      # Fails if ANY function anywhere crosses the CRITICAL thresholds, not just
      # in changed files. Runs on every event (incl. pushes to main/staging), so
      # a direct push is gated too. --no-install/--no-cache mirror the audit step.
      - name: fallow health (no CRITICAL findings repo-wide)
        run: npx --no-install fallow health --min-severity critical --no-cache

  build:
    # Production type-check + bundle. vitest transpiles via esbuild and does NOT
    # type-check, so type-only errors slip past `test`/`lint` and only surface in
    # the `tsc` build Railway runs. This job is that gate. No Postgres needed —
    # it only type-checks and bundles; `prisma generate` provides the client
    # types the backend `tsc` imports.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate
        working-directory: backend
        # prisma.config.ts validates DATABASE_URL at load even for `generate`,
        # which never connects — a dummy URL satisfies it without a Postgres.
        env:
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
        run: npx prisma generate

      - run: npm run build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Keep this in sync with the image in docker-compose.yml
        image: postgres:17-alpine
        env:
          POSTGRES_USER: character_sheet
          POSTGRES_PASSWORD: character_sheet
          POSTGRES_DB: character_sheet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U character_sheet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://character_sheet:character_sheet@localhost:5432/character_sheet

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate / migrate / seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - run: npm test

  e2e:
    # Playwright smoke suite against a booted dev stack (same postgres service as
    # `test`, plus the backend + Vite dev servers the e2e harness proxies through).
    # A required check. Runs SERIALLY (playwright.config.ts sets workers: 1) — the
    # specs share one dev stack and a campaign allows only one active session, so
    # parallel workers overload the stack; don't reintroduce --workers here.
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # Keep this in sync with the image in docker-compose.yml
        image: postgres:17-alpine
        env:
          POSTGRES_USER: character_sheet
          POSTGRES_PASSWORD: character_sheet
          POSTGRES_DB: character_sheet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U character_sheet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://character_sheet:character_sheet@localhost:5432/character_sheet

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install -g npm@11  # align with npm 11 that generated package-lock.json (npm/cli#4828)

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate / migrate / seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        # ALLOW_DEV_LOGIN powers the e2e harness's passwordless session mint; PORT
        # matches the Vite proxy target below. Backgrounded — survives to later steps.
        env:
          PORT: "4000"
          ALLOW_DEV_LOGIN: "true"
        run: nohup npm run dev --workspace backend > /tmp/backend.log 2>&1 &

      - name: Build frontend
        # e2e runs against the production build (served by `vite preview`), NOT the
        # dev server — pre-compiled assets render fast + deterministically, so no
        # on-demand compilation slows first renders and times out specs.
        # VITE_API_URL is inlined at build time and keeps the SPA same-origin.
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Start frontend (preview)
        # `vite preview` serves the built dist/ on :5173 with the same /api proxy
        # (vite.config.ts `preview.proxy`), so the session cookie stays first-party.
        env:
          VITE_PROXY_TARGET: http://localhost:4000
        run: nohup npm run preview --workspace frontend -- --port 5173 > /tmp/frontend.log 2>&1 &

      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/api/health >/dev/null && curl -sf http://localhost:5173 >/dev/null; then
              echo "stack ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "stack failed to start"; cat /tmp/backend.log /tmp/frontend.log; exit 1

      - name: Run Playwright
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5173
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7
