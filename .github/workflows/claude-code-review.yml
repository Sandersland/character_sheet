name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel an in-flight review when new commits are pushed to the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip draft PRs and fork PRs (forks can't access repo secrets).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Full Sonnet review for PRs merging into main; a lighter, tightly-scoped
      # Haiku review for feature-branch PRs targeting a non-main branch.
      - name: Select review depth by base branch
        id: cfg
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            echo 'claude_args=--model claude-sonnet-4-6' >> "$GITHUB_OUTPUT"
          else
            echo 'claude_args=--model claude-haiku-4-5-20251001 --append-system-prompt "This is a feature-branch PR targeting a non-main branch. Keep the review tightly scoped: report only correctness bugs and clear logic errors in the changed lines. Skip style, naming, and minor nitpicks. Be concise."' >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: ${{ steps.cfg.outputs.claude_args }}
