name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel an in-flight review when new commits are pushed to the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip draft PRs, fork PRs (forks can't access repo secrets), and the
    # staging->main promote PR — every line in a promote was already reviewed on
    # its feature PR, so re-reviewing the aggregate is pure latency. This skip
    # must stay JOB-level: a skipped job still reports a "skipped" conclusion,
    # which satisfies main's required claude-review check; a workflow-level
    # filter would report nothing and block the promote's auto-merge forever.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(github.event.pull_request.head.ref == 'staging' && github.event.pull_request.base.ref == 'main')
    permissions:
      contents: read
      pull-requests: write # Required to post inline review comments + tracking comment
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Sonnet review for every PR. A SHARED mandate — documentation-impact +
      # comment-drift checks, an anti-false-positive guard, and a formal
      # REQUEST_CHANGES verdict — applies uniformly to ALL base branches (#157),
      # so doc/comment drift is caught at the feature->staging PR where it's
      # introduced rather than deferred to (and surprise-failing) the
      # staging->main promotion. --allowed-tools keep the reviewer's read/search
      # tools AND permit `gh pr review`, so the reviewer can submit its verdict —
      # which the "Enforce verdict" step below turns into a pass/fail check.
      # NOTE: preserve the single-outer / double-inner quoting around
      # --append-system-prompt; the inner double quotes keep the prompt a single
      # arg. `$SHARED` is interpolated via the standard '"'"$VAR"'"' splice.
      - name: Configure review
        id: cfg
        run: |
          SHARED='After reviewing code, assess DOCUMENTATION IMPACT: map the PR changed paths through the doc-ownership map in CLAUDE.md (backend/src/routes or app.ts -> architecture.md router map; backend/src/lib -> architecture.md lib table / leveling.md; schema.prisma JSON columns/models/event types -> architecture.md; backend/src/lib/events.ts EventCategory -> architecture.md audit log; frontend/src/{features,pages,components/ui,lib} -> frontend.md; new mutable transaction domain -> CLAUDE.md + architecture.md; Dockerfile/compose/env -> deployment.md; package.json/Prisma -> development.md). For any doc-significant change lacking a matching doc update in this PR, post a comment naming the specific doc + section to update. COMMENT DRIFT: inspect the diff for code comments, docstrings, or schema.prisma model comments that the change contradicts or strands (code under a comment changed but the comment claim is now stale, or new behavior a nearby comment misdescribes); flag each inline. ANTI-FALSE-POSITIVE: Review the three-dot base...head diff only. Before claiming any file/doc/symbol is missing or absent, read it at the PR HEAD with the Read tool and confirm; never infer absence from a merge diff. VERDICT: submit a formal PR review of REQUEST_CHANGES (run: gh pr review ${{ github.event.pull_request.number }} --request-changes --body <summary>) when EITHER documentation/comments need updating OR there are findings beyond minor nits; otherwise approve or comment as usual. Keep the inline --comment findings; the verdict just summarizes.'
          echo 'claude_args=--model claude-sonnet-4-6 --allowed-tools "Bash(gh:*)" "Read" "Grep" "Glob" --append-system-prompt "'"$SHARED"'"' >> "$GITHUB_OUTPUT"

      # Record a UTC marker before the review runs. "Enforce verdict" only counts
      # reviews submitted after this instant, so a stale CHANGES_REQUESTED from an
      # earlier run (or a human) can't fail or pass the check on its own.
      - name: Mark review start
        id: marker
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Show a live "review in progress" tracking comment on the PR.
          track_progress: true
          # --comment posts findings as inline review comments on the diff,
          # instead of leaving them in the Action log.
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          claude_args: ${{ steps.cfg.outputs.claude_args }}

      # anthropics/claude-code-action@v1 exits 0 regardless of the review verdict
      # and exposes no conclusion/verdict output, so the formal REQUEST_CHANGES
      # review it submits would not, on its own, fail this check. Re-read the PR's
      # reviews and fail when a blocking review landed during this run. We filter
      # by submit time (the concurrency group guarantees a single in-flight run
      # per PR) rather than by reviewer identity, which the action doesn't expose.
      # Applies to BOTH base branches so main gets a red check too.
      - name: Enforce verdict
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          marker='${{ steps.marker.outputs.ts }}'
          reviews=$(gh pr view ${{ github.event.pull_request.number }} --json reviews --jq '.reviews')
          blocking=$(printf '%s' "$reviews" | jq --arg marker "$marker" '[.[] | select(.submittedAt > $marker and .state == "CHANGES_REQUESTED")] | length')
          if [ "$blocking" -gt 0 ]; then
            echo "::error::Claude Code Review requested changes on this PR. Resolve the blocking findings and push to re-run."
            exit 1
          fi
          echo "No blocking review verdict — claude-review passes."

      # A clean run leaves the CHECK green, but a CHANGES_REQUESTED review the
      # bot submitted on an EARLIER run is never auto-dismissed (main/staging
      # keep dismiss_stale_reviews:false so human approvals survive a push). That
      # stale verdict keeps reviewDecision = CHANGES_REQUESTED and blocks merge
      # until a human dismisses it by hand. Since this step only runs when
      # "Enforce verdict" passed (no post-marker CHANGES_REQUESTED exists), any
      # remaining CHANGES_REQUESTED by the bot is provably stale — dismiss it.
      # Scope to the reviewer bot's own login so a HUMAN change-request is never
      # touched. REST /reviews is used (not gh pr view) because the dismissals
      # endpoint needs the integer review id, not a GraphQL node id.
      - name: Dismiss stale bot change-request
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr='${{ github.event.pull_request.number }}'
          repo='${{ github.repository }}'
          bot='claude[bot]'
          ids=$(gh api "/repos/$repo/pulls/$pr/reviews" --paginate \
            --jq ".[] | select(.state == \"CHANGES_REQUESTED\" and .user.login == \"$bot\") | .id")
          if [ -z "$ids" ]; then
            echo "No stale ${bot} change-request to dismiss."
            exit 0
          fi
          for id in $ids; do
            echo "Dismissing stale ${bot} review $id (superseded by clean re-run)."
            gh api -X PUT "/repos/$repo/pulls/$pr/reviews/$id/dismissals" \
              -f message="Superseded: claude-review re-ran clean on a later commit." \
              -f event="DISMISS" >/dev/null
          done
