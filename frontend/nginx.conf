server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Vite emits content-hashed filenames under /assets/, so a new build always
  # produces new URLs — the old bundles can be cached immutably and forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: unknown paths resolve to index.html so react-router can
  # handle client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
