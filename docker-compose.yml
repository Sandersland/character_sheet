services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-character_sheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-character_sheet}
      POSTGRES_DB: ${POSTGRES_DB:-character_sheet}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["tools"]          # opt-in: `docker compose --profile tools up pgadmin`
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-character_sheet}:${POSTGRES_PASSWORD:-character_sheet}@db:5432/${POSTGRES_DB:-character_sheet}
      # OAuth: provider auto-enables once both id+secret are set (put real values
      # in a root .env). APP_BASE_URL is the browser-facing origin — the SPA at
      # :5173, which proxies /api to this backend (see frontend below) — so the
      # OAuth redirect_uri and the post-login redirect both land on the app.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      # Same-origin via the dev proxy: the SPA calls "/api/*" and Vite forwards
      # to the backend (VITE_PROXY_TARGET). Keeps the session cookie same-origin.
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:4000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
  pgadmin_data:
