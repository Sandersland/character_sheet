# Portable production stack — deploy anywhere Docker runs.
#
# Uses the combined single-origin image (the API serves the built SPA), so the
# whole app is reachable on one port behind one hostname. Run with:
#
#   cp .env.production.example .env.production   # then edit secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up --build
#
# Split mode (frontend + API as separate hosts) is also supported via
# backend/Dockerfile.prod + frontend/Dockerfile.prod, wired by CORS_ORIGIN and
# VITE_API_URL — see .env.production.example.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-character_sheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-character_sheet}
      POSTGRES_DB: ${POSTGRES_DB:-character_sheet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-character_sheet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-4000}:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-character_sheet}:${POSTGRES_PASSWORD:-character_sheet}@db:5432/${POSTGRES_DB:-character_sheet}
      SERVE_STATIC_DIR: /app/public
      # Single-origin → no CORS needed. For split mode, set CORS_ORIGIN here.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
